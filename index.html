<title>Brainrot TCG</title>
<style>
/* Styles généraux */
body{margin:0;font-family:Arial;background:#0e1525;color:#e8eef7;padding:20px;text-align:center}
h1{text-align:center;margin:0 0 20px}
button{padding:10px 14px;border-radius:8px;border:0;background:#7c3aed;color:#fff;cursor:pointer}
button:disabled{background:#3b3b3b;cursor:not-allowed}
.section{max-width:700px;margin:auto}
.cards{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;justify-content:center}
.card{background:#162037;padding:10px;border-radius:10px;width:140px;text-align:center}
.card strong{display:block}
.note{color:#8da0b8;font-size:0.9rem;margin-top:6px}
#bigCardOverlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);display:flex;align-items:center;justify-content:center;z-index:10000;display:none;flex-direction:column;cursor:pointer}
#bigCardOverlay img{max-width:60%;border-radius:12px;margin-bottom:15px}
#bigCardName{color:#fff;font-size:1.5rem;margin-bottom:10px}

/* Animation booster flash */
@keyframes boosterFlash {
  0% { opacity: 0; }
  40% { opacity: 1; }
  100% { opacity: 0; }
}
.flash-effect {
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  background: white;
  opacity: 0;
  pointer-events: none;
  z-index: 9999;
  animation: boosterFlash 0.45s ease-out forwards;
}
.booster.booster-opening {
  animation: boosterFlash 0.45s ease-out forwards;
}

.card {
  position: relative;
}

.new-label {
  position: absolute;
  top: 5px;
  left: 50%;
  transform: translateX(-50%);
  background-color: #ff69b4;
  color: #fff;
  font-size: 0.8rem;
  font-weight: bold;
  padding: 2px 6px;
  border-radius: 6px;
  z-index: 10;
}
.card-wrapper {
  position: relative; /* nécessaire pour positionner le label au-dessus de la carte */
}


/* --- Taille standard type carte Pokémon --- */
.card {
    width: 180px;
    height: 260px;
    background: #162037;
    border-radius: 12px;
    padding: 10px;
    box-sizing: border-box;
    text-align: center;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    position: relative;
    overflow: hidden;
    border: 3px solid #fff; /* à adapter selon rareté */
}

.card img {
    width: calc(100% - 10px);  /* laisse 5px de chaque côté */
    height: 50%;                /* exactement la moitié de la carte */
    object-fit: contain;        /* garde les proportions sans étirer */
    display: block;
    margin: 5px auto 10px auto; /* petit espace en haut et entre image/nom */
    border-radius: 8px;
}



/* Contours par rareté */
.r-Commun      { border-color: #b0b0b0; }   /* gris */
.r-Rare   { border-color: #3cb043; }   /* vert */
.r-Epic       { border-color: #a335ee; }   /* bleu */
.r-Legendary { border-color: #FFD700; }
.r-Mythic  { border-color: #FF8C00; }   /* orange */
.r-Brainrot-God  { border-color: #FF4500; }
.r-Secret  { border-color: #DA70D6; }
.r-OG  { border-color: #00FFFF; }



/* Carte grand format pendant l'ouverture du booster */
.big-card {
    width: 260px;
    height: 380px;
    background: #162037;
    border-radius: 16px;
    padding: 12px;
    text-align: center;
    border: 6px solid;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
}

.big-card img {
    display: block;
    margin: 0 auto 12px auto;  /* centre l’image */
    max-width: 100%;           /* évite seulement de dépasser la carte */
    height: auto;              /* conserve la vraie proportion */
    border-radius: 10px;
}



/* Couleur du nom des cartes selon la rareté */

/* --- Couleur du texte pour les petites cartes --- */
.r-Commun strong { color: #b0b0b0; }
.r-Rare strong { color: #3cb043; }
.r-Epic strong { color: #a335ee; }
.r-Legendary strong { color: #FFD700; }
.r-Mythic strong { color: #FF8C00; }
.r-Brainrot-God strong { color: #FF4500; }
.r-Secret strong { color: #DA70D6; }
.r-OG strong { color: #00FFFF; }

/* --- Bordure pour grandes cartes --- */
.big-Commun { border-color: #b0b0b0; }
.big-Rare { border-color: #3cb043; }
.big-Epic { border-color: #a335ee; }
.big-Legendary { border-color: #FFD700; }
.big-Mythic { border-color: #FF8C00; }
.big-Brainrot-God { border-color: #FF4500; }
.big-Secret { border-color: #DA70D6; }
.big-OG { border-color: #00FFFF; }

/* --- Texte pour grandes cartes --- */
.big-Commun strong { color: #b0b0b0; }
.big-Rare strong { color: #3cb043; }
.big-Epic strong { color: #a335ee; }
.big-Legendary strong { color: #FFD700; }
.big-Mythic strong { color: #FF8C00; }
.big-Brainrot-God strong { color: #FF4500; }
.big-Secret strong { color: #DA70D6; }
.big-OG strong { color: #00FFFF; }

/* --- Badge pourcentage selon rareté --- */
.rarity-indicator {
    position: absolute;
    bottom: 5px;  /* en bas */
    right: 5px;   /* à droite */
    padding: 2px 6px;
    border-radius: 6px;
    font-size: 0.75rem;
    font-weight: bold;
    pointer-events: none;
    color: #fff;
    background: #555; /* fallback */
}

.rarity-indicator.r-OG {
    background: rgba(0,0,0,0.6); /* fond semi-transparent pour OG */
    color: #fff;
}

/* Couleur selon rareté */
.rarity-indicator.r-Commun { background: #b0b0b0; }
.rarity-indicator.r-Rare { background: #3cb043; }
.rarity-indicator.r-Epic { background: #a335ee; }
.rarity-indicator.r-Legendary { background: #FFD700; color: #000; }
.rarity-indicator.r-Mythic { background: #FF8C00; }
.rarity-indicator.r-Brainrot-God { background: #FF4500; }
.rarity-indicator.r-Secret { background: #DA70D6; }
.rarity-indicator.r-OG { background: #00FFFF; color: #000; }


#dustDisplay {
  display: none;
}


</style>
</head>

// --- Stockage ---
function load(key,def){try{return JSON.parse(localStorage.getItem(key)||JSON.stringify(def));}catch(e){return def;}}
function save(key,val){localStorage.setItem(key,JSON.stringify(val));}
let collection = load("collection",[]);
let daily = load("daily",{date:null,opened:0});
let dust = load("dust", 0);

function refreshDust(){
  document.getElementById("dustDisplay").textContent = "💎 Fragments : " + dust;
}


// --- Helper ---
function pickRandomCard(){
  const total = Object.values(RARITY_PROBS).reduce((a,b)=>a+b,0);
  let r = Math.random()*total;
  let chosenRarity;
  for(const [rarity,prob] of Object.entries(RARITY_PROBS)){
    r -= prob;
    if(r <= 0){ chosenRarity = rarity; break; }
  }
  const cards = ALL_CARDS.filter(c=>c.rarity===chosenRarity);
  if(cards.length===0) return ALL_CARDS[Math.floor(Math.random()*ALL_CARDS.length)];
  return cards[Math.floor(Math.random()*cards.length)];
}

function escapeHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function cardHTML(c){return `<div class="card"><img src="${c.image}" style="width:100%;height:100px;object-fit:cover;border-radius:8px;margin-bottom:8px"><strong>${escapeHtml(c.name)}</strong><span style="color:#9bb0c8">${escapeHtml(c.rarity)}</span></div>`;}
function refreshLimit(){
  const today = new Date().toISOString().slice(0,10);
  if(daily.date !== today){ daily={date:today,opened:0}; save('daily',daily);}
  const rest = 2-(daily.opened||0);
  document.getElementById("remaining").textContent=`Boosters restants aujourd'hui : ${rest}`;
  document.getElementById("openPack").disabled = rest<=0;
}

function showBigCard() {
    if (currentCardIndex >= currentPack.length) {
        overlay.style.display = 'none';
        refreshCollection();
        refreshLimit();
        return;
    }

    const c = currentPack[currentCardIndex];

    const wrapper = document.createElement("div");
    wrapper.className = "card-wrapper";

    if (c.isNew) {
        const label = document.createElement("div");
        label.className = "new-label";
        label.textContent = "NOUVEAU";
        wrapper.appendChild(label);
    }

    const cardDiv = document.createElement("div");

    if (c.rarity === "OG") {
        // OG : image plus grande comme dans l'ouverture de booster
        cardDiv.className = "card big-card big-OG";
        cardDiv.style.border = "none";
        cardDiv.style.padding = "0";
        cardDiv.style.background = "none";
cardDiv.innerHTML = `<img src="${c.image}" 
                      style="max-width:90vw; max-height:90vh; object-fit:contain; display:block; margin:auto; border-radius:12px;">`;
    } else {
        // Les autres cartes : inchangées
        cardDiv.className = "card big-card big-" + c.rarity.replace(/ /g, "-");
        cardDiv.innerHTML = `
          <div style="font-size:1rem;color:#ccc;margin-bottom:6px;">${escapeHtml(c.rarity)}</div>
          <img src="${c.image}" alt="${c.name}">
          <strong>${escapeHtml(c.name)}</strong>
        `;
    }

    wrapper.appendChild(cardDiv);
    overlay.innerHTML = "";
    overlay.appendChild(wrapper);
    overlay.style.display = "flex";
}

// --- Ouvrir booster ---
function openPackSequence() {
  const chooseArea = document.getElementById("choosePackArea");
  chooseArea.style.display = "flex";
  chooseArea.style.justifyContent = "center";
  chooseArea.style.gap = "30px";
  chooseArea.style.marginTop = "40px";

  chooseArea.innerHTML = BOOSTER_IMAGES.map((img, i) =>
    `<div class="booster" data-id="${i}" style="width:150px;height:220px;border-radius:14px;cursor:pointer;overflow:hidden;box-shadow:0 0 15px rgba(0,0,0,0.4);transition:transform .15s">
        <img src="${img}" style="width:100%;height:100%;object-fit:cover;">
     </div>`).join("");

  document.querySelectorAll(".booster").forEach(b => {
    b.onmouseenter = () => b.style.transform = "scale(1.08)";
    b.onmouseleave = () => b.style.transform = "scale(1)";
    b.onclick = () => {
      if (b.classList.contains("booster-opening")) return;
      b.classList.add("booster-opening");

      const flash = document.createElement("div");
      flash.classList.add("flash-effect");
      document.body.appendChild(flash);
      setTimeout(() => flash.remove(), 450);

      setTimeout(() => {
        chooseArea.style.display = "none";

        // --- Toujours 3 cartes ---
        currentPack = [pickRandomCard(), pickRandomCard(), pickRandomCard()];

currentPack.forEach(c => {

  const exists = collection.some(card => card.name === c.name);

  if (!exists) {

    c.isNew = true;
    collection.push(c);

  } else {

    c.isNew = false;

    const dustValues = {
      "Commun":1,
      "Rare":3,
      "Epic":8,
      "Legendary":20,
      "Mythic":50,
      "Brainrot God":200,
      "Secret":500,
      "OG":1000
    };

    dust += dustValues[c.rarity] || 1;

  }

});

        save("collection", collection);
save("dust", dust);
refreshDust();
        currentCardIndex = 0;
        showBigCard();
      }, 450);
    };
  });
}

    const sortedCards = [...cards].sort(
